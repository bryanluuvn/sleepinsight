<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#12132a">
<title>SleepInsight</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --navy-deep:#12132A;
    --navy-surface:#1C1E3A;
    --navy-line:#2A2D5C;
    --blue:#4A6CF7;
    --purple:#8B5CF6;
    --dawn-peach:#F5B98C;
    --dawn-pink:#F2778A;
    --off-white:#F8F9FF;
    --muted:#8B8FB8;
    --good:#5FD8A6;
    --warn:#F2A65A;
    --bad:#F2778A;
    --radius:18px;
    --font-display:'Space Grotesk', 'Inter', sans-serif;
    --font-body:'Inter', -apple-system, sans-serif;
    --font-mono:'JetBrains Mono', 'SF Mono', monospace;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    background:radial-gradient(120% 100% at 50% 0%, #1a1c3d 0%, var(--navy-deep) 55%);
    color:var(--off-white);
    font-family:var(--font-body);
    min-height:100vh;
    display:flex;
    justify-content:center;
  }
  #app{
    width:100%;
    max-width:480px;
    min-height:100vh;
    padding:20px 18px 100px;
    position:relative;
  }
  .top-greeting{
    font-family:var(--font-display);
    font-size:15px;
    color:var(--muted);
    letter-spacing:.02em;
    margin-bottom:2px;
  }
  .top-date{
    font-family:var(--font-mono);
    font-size:13px;
    color:var(--muted);
    margin-bottom:18px;
  }

  /* Day ring */
  .ring-wrap{
    position:relative;
    width:220px;height:220px;
    margin:8px auto 22px;
    filter:drop-shadow(0 8px 24px rgba(74,108,247,.18));
  }
  .ring-bg{
    position:absolute;inset:0;border-radius:50%;
    background:conic-gradient(from 0deg,
      #14163a 0deg, #14163a 40deg,
      var(--purple) 70deg,
      var(--dawn-pink) 95deg,
      var(--dawn-peach) 115deg,
      #cfe0ff 150deg, #cfe0ff 210deg,
      var(--dawn-peach) 245deg,
      var(--dawn-pink) 265deg,
      var(--purple) 290deg,
      #14163a 320deg, #14163a 360deg);
    filter:saturate(0.9);
  }
  .ring-mask{
    position:absolute; inset:14px; border-radius:50%;
    background:radial-gradient(120% 120% at 30% 20%, #1a1c42 0%, var(--navy-deep) 70%);
    box-shadow:inset 0 0 30px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.04);
  }
  .ring-svg{position:absolute;inset:0;transform:rotate(-90deg);}
  .ring-center{
    position:absolute;inset:0;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;
  }
  .ring-center .big{font-family:var(--font-display);font-size:30px;font-weight:600;letter-spacing:-.01em;}
  .ring-center .small{font-family:var(--font-mono);font-size:12px;color:var(--muted);margin-top:2px;}
  .time-marker{
    position:absolute; top:50%; left:50%;
    width:10px;height:10px;border-radius:50%;
    background:#fff; box-shadow:0 0 12px 3px rgba(255,255,255,.8);
    margin:-5px;
    transform-origin:5px 5px;
  }

  /* Cards */
  .card{
    background:linear-gradient(165deg, rgba(255,255,255,.03), rgba(255,255,255,0) 40%), var(--navy-surface);
    border:1px solid var(--navy-line);
    border-radius:var(--radius);
    padding:18px;
    margin-bottom:14px;
    box-shadow:0 4px 18px rgba(0,0,0,.22), inset 0 1px 0 rgba(255,255,255,.03);
  }
  .card.cta{
    background:linear-gradient(135deg, rgba(74,108,247,.18), rgba(139,92,246,.12));
    border:1px solid rgba(139,92,246,.35);
  }
  .box-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px;}
  .box{
    background:linear-gradient(165deg, rgba(255,255,255,.03), rgba(255,255,255,0) 50%), var(--navy-surface);
    border:1px solid var(--navy-line);
    border-radius:14px;padding:16px 6px;text-align:center;cursor:pointer;
    box-shadow:0 4px 14px rgba(0,0,0,.2);
    transition:transform .12s ease, box-shadow .12s ease, border-color .12s ease;
  }
  .box:active{transform:scale(.96);}
  .box.done{border-color:var(--good);background:linear-gradient(135deg, rgba(95,216,166,.14), var(--navy-surface));box-shadow:0 4px 16px rgba(95,216,166,.12);}
  .box .box-ic{font-size:22px;display:block;margin-bottom:6px;}
  .box .box-label{font-size:12px;font-weight:600;}
  .box .box-status{font-size:10px;color:var(--muted);margin-top:4px;}
  .box.done .box-status{color:var(--good);font-weight:600;}
  .slider-wrap{margin-top:10px;}
  .slider-display{font-family:var(--font-mono);font-size:22px;font-weight:600;text-align:center;margin-bottom:10px;}
  .time-slider{-webkit-appearance:none;appearance:none;width:100%;height:6px;border-radius:3px;background:var(--navy-line);outline:none;}
  .time-slider::-webkit-slider-thumb{-webkit-appearance:none;width:28px;height:28px;border-radius:50%;background:var(--blue);box-shadow:0 2px 8px rgba(0,0,0,.35), 0 0 0 6px rgba(74,108,247,.22);cursor:pointer;transition:box-shadow .12s ease;}
  .time-slider::-moz-range-thumb{width:28px;height:28px;border-radius:50%;background:var(--blue);border:none;box-shadow:0 2px 8px rgba(0,0,0,.35), 0 0 0 6px rgba(74,108,247,.22);cursor:pointer;}
  .cta-label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;}
  .cta-title{font-family:var(--font-display);font-size:19px;font-weight:600;margin-bottom:12px;letter-spacing:-.01em;}
  .row{display:flex;gap:10px;}
  .stat{flex:1;text-align:center;}
  .stat .v{font-family:var(--font-mono);font-size:20px;font-weight:600;}
  .stat .l{font-size:11px;color:var(--muted);margin-top:2px;}

  button{font-family:var(--font-body);border:none;cursor:pointer;transition:transform .1s ease, background .15s ease, opacity .15s ease;}
  .btn-primary{
    width:100%;padding:16px;border-radius:14px;
    background:linear-gradient(135deg, var(--blue), #5f7bfa);color:#fff;font-weight:600;font-size:15px;
    box-shadow:0 6px 20px rgba(74,108,247,.35);
  }
  .btn-primary:active{transform:scale(.97);box-shadow:0 3px 10px rgba(74,108,247,.3);}
  .btn-ghost{
    width:100%;padding:13px;border-radius:14px;
    background:rgba(255,255,255,.02);border:1px solid var(--navy-line);color:var(--off-white);font-size:14px;
  }
  .btn-ghost:active{transform:scale(.97);background:rgba(255,255,255,.05);}
  .btn-back{background:transparent;color:var(--muted);font-size:14px;padding:8px 0;}

  /* Nav */
  .tabbar{
    position:fixed;bottom:0;left:50%;transform:translateX(-50%);
    width:100%;max-width:480px;
    background:rgba(20,22,50,.85);backdrop-filter:blur(16px);
    border-top:1px solid var(--navy-line);
    box-shadow:0 -8px 24px rgba(0,0,0,.3);
    display:flex;padding:10px 18px calc(10px + env(safe-area-inset-bottom));
  }
  .tab{flex:1;text-align:center;color:var(--muted);font-size:11px;padding:6px 0;border-radius:10px;transition:color .15s ease;}
  .tab.active{color:var(--off-white);background:rgba(74,108,247,.12);}
  .tab .ic{font-size:18px;display:block;margin-bottom:2px;}

  /* Form step */
  .step-progress{display:flex;gap:5px;margin-bottom:16px;}
  .step-dot{flex:1;height:4px;border-radius:2px;background:var(--navy-line);transition:background .2s ease;}
  .step-dot.done{background:var(--blue);}
  .field{margin-bottom:20px;}
  .field label{display:block;font-size:13px;color:var(--muted);margin-bottom:8px;}
  input[type=time], input[type=number], input[type=text]{
    width:100%;padding:13px 14px;border-radius:12px;
    background:var(--navy-deep);border:1px solid var(--navy-line);
    color:var(--off-white);font-family:var(--font-mono);font-size:16px;
    transition:border-color .15s ease, box-shadow .15s ease;
  }
  input[type=time]:focus, input[type=number]:focus, input[type=text]:focus{
    outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(74,108,247,.2);
  }
  .seg{display:flex;gap:8px;flex-wrap:wrap;}
  .seg-btn{
    flex:1;min-width:56px;padding:12px 6px;border-radius:12px;
    background:var(--navy-deep);border:1px solid var(--navy-line);
    color:var(--off-white);font-size:13px;text-align:center;
    transition:transform .1s ease, background .15s ease, border-color .15s ease;
  }
  .seg-btn:active{transform:scale(.95);}
  .seg-btn.sel{background:linear-gradient(135deg, var(--blue), #5f7bfa);border-color:var(--blue);font-weight:600;box-shadow:0 4px 14px rgba(74,108,247,.3);}
  .scale5{display:flex;gap:6px;}
  .scale5 .dot{
    flex:1;aspect-ratio:1;border-radius:12px;
    background:var(--navy-deep);border:1px solid var(--navy-line);
    display:flex;align-items:center;justify-content:center;
    font-family:var(--font-mono);font-size:15px;color:var(--muted);
    transition:transform .1s ease, background .15s ease;
  }
  .scale5 .dot:active{transform:scale(.92);}
  .scale5 .dot.sel{background:linear-gradient(135deg, var(--purple), #a375f7);border-color:var(--purple);color:#fff;font-weight:700;box-shadow:0 4px 14px rgba(139,92,246,.32);}
  .stepper-num{display:flex;align-items:center;gap:12px;}
  .stepper-num button{
    width:40px;height:40px;border-radius:10px;background:var(--navy-deep);
    border:1px solid var(--navy-line);color:var(--off-white);font-size:18px;
  }
  .stepper-num .val{flex:1;text-align:center;font-family:var(--font-mono);font-size:18px;}
  .subfield{margin-top:10px;padding-top:10px;border-top:1px dashed var(--navy-line);}
  .hint{font-size:11px;color:var(--muted);margin-top:6px;}

  /* History */
  .hist-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--navy-line);}
  .hist-date{font-family:var(--font-mono);font-size:12px;color:var(--muted);width:52px;}
  .hist-bar-wrap{flex:1;height:8px;background:var(--navy-deep);border-radius:4px;overflow:hidden;}
  .hist-bar{height:100%;border-radius:4px;}
  .hist-q{font-family:var(--font-mono);font-size:12px;width:26px;text-align:right;}
  .chip{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;background:var(--navy-deep);color:var(--muted);margin-right:6px;margin-top:6px;}

  .empty{text-align:center;color:var(--muted);font-size:13px;padding:30px 10px;}
  .section-title{font-family:var(--font-display);font-size:15px;font-weight:600;margin:22px 0 10px;color:var(--off-white);}
  ::selection{background:var(--purple);}
  .screen-enter{animation:screenIn .32s cubic-bezier(.22,.9,.36,1) both;}
  @keyframes screenIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
  @media (prefers-reduced-motion: reduce){
    .screen-enter{animation:none;}
    *{transition:none !important;}
  }
</style>
</head>
<body>
<div id="app"></div>

<script>
/* ---------------- User identity ---------------- */
const USER_KEY = 'sleepinsight_user';
function getUser(){ return localStorage.getItem(USER_KEY) || ''; }
function setUser(name){ localStorage.setItem(USER_KEY, name.trim()); }
function clearUser(){ localStorage.removeItem(USER_KEY); }
function storeKey(){ return 'sleepinsight_logs_v1_' + (getUser() || 'guest'); }

/* ---------------- Backend sync config ---------------- */
// Dán URL deployment Apps Script (dạng https://script.google.com/macros/s/XXXX/exec) vào đây.
// Để trống '' nếu chỉ muốn dùng offline (localStorage only).
const CONFIG = { API_URL: 'https://script.google.com/macros/s/AKfycbyrgeZvwjL1VQtSk3DpxZWcGFbuun0BSGaRHJ-jhFIrjCROMOVOHlD2_YwM3bocpWEw6g/exec' };

async function pushToBackend(record){
  if(!CONFIG.API_URL) return;
  try{
    await fetch(CONFIG.API_URL, {
      method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'}, // tránh CORS preflight với Apps Script
      body: JSON.stringify(Object.assign({}, record, {user:getUser()}))
    });
  }catch(err){ console.warn('Sync lên Sheets thất bại, sẽ thử lại lần sau', err); }
}

async function pullFromBackend(){
  if(!CONFIG.API_URL) return false;
  try{
    const res = await fetch(CONFIG.API_URL + '?user=' + encodeURIComponent(getUser()));
    const remote = await res.json();
    const local = loadLogs();
    remote.forEach(r=>{
      if(!r.date) return;
      // ưu tiên bản local nếu đã có (tránh ghi đè chỉnh sửa chưa kịp sync),
      // chỉ bổ sung record nào local chưa có
      if(!local[r.date]) local[r.date] = r;
    });
    saveLogs(local);
    return true;
  }catch(err){ console.warn('Kéo dữ liệu từ Sheets thất bại', err); return false; }
}

/* ---------------- Data layer ---------------- */
const TARGET_SLEEP_H = 7.5;

function loadLogs(){
  try{ return JSON.parse(localStorage.getItem(storeKey()) || '{}'); }catch(e){ return {}; }
}
function saveLogs(logs){ localStorage.setItem(storeKey(), JSON.stringify(logs)); }
function getLog(dateKey){ const L=loadLogs(); return L[dateKey] || {date:dateKey}; }
function setLog(dateKey, patch){
  const L=loadLogs();
  const merged = Object.assign({date:dateKey, user:getUser()}, L[dateKey]||{}, patch);
  L[dateKey] = merged;
  saveLogs(L);
  pushToBackend(merged);
}
function deleteLog(dateKey){
  const L=loadLogs();
  delete L[dateKey];
  saveLogs(L);
  pushToBackend({date:dateKey, _delete:true});
}
function fmtDateKey(d){
  const p=n=>String(n).padStart(2,'0');
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`;
}
function addDays(d,n){ const r=new Date(d); r.setDate(r.getDate()+n); return r; }
function todayKey(){ return fmtDateKey(new Date()); }
function yesterdayKey(){ return fmtDateKey(addDays(new Date(),-1)); }

// which sessionKey is "tonight" (shifts before 4am to previous date)
function eveningSessionKey(){
  const h = new Date().getHours();
  return h < 4 ? yesterdayKey() : todayKey();
}

function findPending(){
  const logs = loadLogs();
  const keys = Object.keys(logs).sort();
  // pending morning: most recent session with evening filled, no morning
  for(let i=keys.length-1;i>=0;i--){
    const k=keys[i], l=logs[k];
    if(l.eveningDone && !l.morningDone) return {type:'morning', key:k};
  }
  for(let i=keys.length-1;i>=0;i--){
    const k=keys[i], l=logs[k];
    if(l.morningDone && !l.eodDone) return {type:'eod', key:k};
  }
  return null;
}

function currentSessionKey(){
  const pending = findPending();
  if(pending) return pending.key;
  return eveningSessionKey();
}
function findPreviousLog(beforeKey, doneFlag){
  const logs = loadLogs();
  const keys = Object.keys(logs).filter(k=>k<beforeKey && logs[k][doneFlag]).sort();
  return keys.length ? logs[keys[keys.length-1]] : null;
}

function decideContext(){
  const h = new Date().getHours();
  const pending = findPending();
  if(pending) return pending;
  const evKey = eveningSessionKey();
  const evLog = getLog(evKey);
  if(!evLog.eveningDone && (h>=18 || h<4)) return {type:'evening', key:evKey};
  if(!evLog.eveningDone) return {type:'evening_early', key:evKey}; // daytime, not yet evening but nothing pending
  return {type:'done'};
}

/* ---------------- Router ---------------- */
let route = {name:'home'};
function nav(r){ route=r; render(); window.scrollTo(0,0); }

function render(){
  if(!getUser() && route.name!=='onboarding'){ route={name:'onboarding'}; }
  const app = document.getElementById('app');
  app.innerHTML = '';
  if(route.name==='onboarding') { const w=renderOnboarding(); w.classList.add('screen-enter'); app.append(w); return; }
  let content;
  if(route.name==='home') content=renderHome();
  else if(route.name==='evening') content=renderEveningForm(route.key);
  else if(route.name==='morning') content=renderMorningForm(route.key);
  else if(route.name==='eod') content=renderEodForm(route.key);
  else if(route.name==='history') content=renderHistory();
  else if(route.name==='edit') content=renderEditForm(route.key);
  content.classList.add('screen-enter');
  app.append(content);
  app.append(renderTabbar());
}

function renderOnboarding(){
  const wrap=el('div');
  wrap.style.paddingTop='60px';
  wrap.appendChild(elText('div','top-greeting','Chào mừng đến với'));
  wrap.appendChild(elText('div','cta-title','SleepInsight'));
  const card=el('div','card');
  card.appendChild(elText('div','hint','Nhập tên hoặc email để dữ liệu của bạn tách riêng, không lẫn với người khác dùng chung Sheet.'));
  const f=el('div','field'); f.style.marginTop='14px';
  const inp=document.createElement('input');
  inp.type='text'; inp.placeholder='VD: bryan hoặc bryan@email.com';
  f.appendChild(inp);
  card.appendChild(f);
  wrap.appendChild(card);
  wrap.appendChild(primaryBtn('Bắt đầu', ()=>{
    if(!inp.value.trim()) return;
    setUser(inp.value);
    nav({name:'home'});
  }));
  return wrap;
}

/* ---------------- Day ring ---------------- */
function dayRing(highlightLog){
  const wrap = el('div','ring-wrap');
  wrap.innerHTML = `<div class="ring-bg"></div><div class="ring-mask"></div>`;
  const now = new Date();
  const marker = el('div','time-marker');
  const minutesNow = now.getHours()*60+now.getMinutes();
  const angNow = (minutesNow/1440)*360;
  marker.style.transform = `rotate(${angNow}deg) translate(105px)`;
  wrap.appendChild(marker);

  // highlight arc for last sleep window
  if(highlightLog && highlightLog.bedtime && highlightLog.wakeTime){
    const svgNS="http://www.w3.org/2000/svg";
    const svg=document.createElementNS(svgNS,'svg');
    svg.setAttribute('viewBox','0 0 220 220');
    svg.classList.add('ring-svg');
    const r=100, cx=110, cy=110;
    const [bh,bm]=highlightLog.bedtime.split(':').map(Number);
    let [wh,wm]=highlightLog.wakeTime.split(':').map(Number);
    let start=(bh*60+bm)/1440*360;
    let end=(wh*60+wm)/1440*360;
    if(end<start) end+=360;
    const circumf=2*Math.PI*r;
    const arcLen=(end-start)/360*circumf;
    const circle=document.createElementNS(svgNS,'circle');
    circle.setAttribute('cx',cx);circle.setAttribute('cy',cy);circle.setAttribute('r',r);
    circle.setAttribute('fill','none');
    circle.setAttribute('stroke','#ffffff');
    circle.setAttribute('stroke-width','5');
    circle.setAttribute('stroke-linecap','round');
    circle.setAttribute('stroke-dasharray',`${arcLen} ${circumf-arcLen}`);
    circle.setAttribute('stroke-dashoffset', -(start/360*circumf));
    circle.setAttribute('opacity','0.85');
    svg.appendChild(circle);
    wrap.appendChild(svg);
  }

  const center = el('div','ring-center');
  const durTxt = (highlightLog && highlightLog.durationH)? highlightLog.durationH.toFixed(1)+'h' : '—';
  const qTxt = (highlightLog && highlightLog.sleepQuality)? '★'+highlightLog.sleepQuality : 'chưa có';
  center.innerHTML = `<div class="big">${durTxt}</div><div class="small">${qTxt} · đêm qua</div>`;
  wrap.appendChild(center);
  return wrap;
}

function computeDuration(l){
  if(!l.bedtime||!l.wakeTime) return null;
  const [bh,bm]=l.bedtime.split(':').map(Number);
  const [wh,wm]=l.wakeTime.split(':').map(Number);
  let start=bh*60+bm, end=wh*60+wm;
  if(end<=start) end+=1440;
  let mins = end-start-(Number(l.sleepLatency)||0);
  return mins/60;
}

/* ---------------- Home ---------------- */
function renderHome(){
  const wrap = el('div');
  const greetings = greetingNow();
  wrap.innerHTML = `<div class="top-greeting">${greetings}</div><div class="top-date">${niceDate(new Date())}</div>`;

  // last completed session for ring
  const logs = loadLogs();
  const keys = Object.keys(logs).sort();
  let lastFull=null;
  for(let i=keys.length-1;i>=0;i--){ if(logs[keys[i]].morningDone){ lastFull=logs[keys[i]]; lastFull.durationH=computeDuration(lastFull); break; } }
  wrap.appendChild(dayRing(lastFull));

  // 3 box cho 3 form — luôn hiện đủ, không đoán/ẩn để tránh sai trạng thái
  const sessKey = currentSessionKey();
  const sessLog = getLog(sessKey);
  const boxRow = el('div','box-row');
  boxRow.appendChild(formBox('🌙','Buổi tối', sessLog.eveningDone, ()=>nav({name:'evening',key:sessKey})));
  boxRow.appendChild(formBox('☀️','Buổi sáng', sessLog.morningDone, ()=>nav({name:'morning',key:sessKey})));
  boxRow.appendChild(formBox('📝','Cuối ngày', sessLog.eodDone, ()=>nav({name:'eod',key:sessKey})));
  wrap.appendChild(boxRow);

  // stats
  const stats = el('div','card');
  const arr = keys.map(k=>logs[k]).filter(l=>l.morningDone).slice(-7);
  const avgDur = avg(arr.map(l=>computeDuration(l)).filter(Boolean));
  const avgQ = avg(arr.map(l=>Number(l.sleepQuality)).filter(Boolean));
  const streak = computeStreak(logs);
  stats.innerHTML = `<div class="row">
    <div class="stat"><div class="v">${avgDur?avgDur.toFixed(1)+'h':'—'}</div><div class="l">TB ngủ 7 ngày</div></div>
    <div class="stat"><div class="v">${avgQ?avgQ.toFixed(1):'—'}</div><div class="l">TB chất lượng</div></div>
    <div class="stat"><div class="v">${streak}🔥</div><div class="l">streak ngày</div></div>
  </div>`;
  wrap.appendChild(stats);

  wrap.appendChild(elText('div','section-title','Ghi chú nhanh'));
  const note = el('div','card');
  note.innerHTML = `<div class="hint">SleepInsight ghi theo 2 mốc mỗi ngày: <b>tối trước khi ngủ</b> và <b>sáng vừa dậy</b>, cộng thêm 1 mốc <b>cuối ngày</b> để nhìn tác động lên hôm sau. Dữ liệu lưu ngay trên máy bạn (chưa đồng bộ đám mây).</div>`;
  wrap.appendChild(note);

}

function formBox(icon, label, done, onClick){
  const b = el('div','box'+(done?' done':''));
  b.innerHTML = `<span class="box-ic">${icon}</span><div class="box-label">${label}</div><div class="box-status">${done?'✓ Đã ghi':'Chưa ghi'}</div>`;

}

function computeStreak(logs){
  let n=0; let d=new Date();
  while(true){
    const k=fmtDateKey(d);
    const l=logs[k];
    if(l && l.eveningDone) { n++; d=addDays(d,-1); } else break;
  }
  return n;
}
function avg(a){ if(!a.length) return null; return a.reduce((x,y)=>x+y,0)/a.length; }
function greetingNow(){
  const h=new Date().getHours();
  if(h<5) return 'Khuya rồi, ngủ ngon nhé 🌙';
  if(h<11) return 'Chào buổi sáng ☀️';
  if(h<18) return 'Chào buổi chiều';
  return 'Chào buổi tối 🌆';
}
function niceDate(d){
  const days=['CN','Th2','Th3','Th4','Th5','Th6','Th7'];
  return `${days[d.getDay()]}, ${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()}`;
}

/* ---------------- UI helpers ---------------- */
function el(tag,cls){ const e=document.createElement(tag); if(cls) e.className=cls; return e; }
function elText(tag,cls,txt){ const e=el(tag,cls); e.textContent=txt; return e; }
function primaryBtn(label,onClick){ const b=el('button','btn-primary'); b.textContent=label; b.onclick=onClick; return b; }
function ghostBtn(label,onClick){ const b=el('button','btn-ghost'); b.textContent=label; b.onclick=onClick; return b; }

function segField(container,label,options,value,onChange){
  const f=el('div','field');
  f.appendChild(elText('label','', label));
  const seg=el('div','seg');
  options.forEach(opt=>{
    const b=el('button','seg-btn'+(value===opt.v?' sel':''));
    b.textContent=opt.l;
    b.onclick=()=>{ onChange(opt.v); };
    seg.appendChild(b);
  });
  f.appendChild(seg);
  container.appendChild(f);
}
function scale5Field(container,label,value,onChange,labels){
  const f=el('div','field');
  f.appendChild(elText('label','', label));
  const sc=el('div','scale5');
  for(let i=1;i<=5;i++){
    const d=el('div','dot'+(Number(value)===i?' sel':''));
    d.textContent=labels?labels[i-1]:i;
    d.onclick=()=>onChange(i);
    sc.appendChild(d);
  }
  f.appendChild(sc);
  container.appendChild(f);
}
function minutesToTimeStr(m){
  const mm=((m%1440)+1440)%1440;
  const h=Math.floor(mm/60), mi=mm%60;
  const p=n=>String(n).padStart(2,'0');
  return p(h)+':'+p(mi);
}
function timeStrToMinutes(v){
  if(!v) return null;
  const parts=v.split(':');
  if(parts.length<2) return null;
  const h=Number(parts[0]), m=Number(parts[1]);
  if(isNaN(h)||isNaN(m)) return null;
  return h*60+m;
}
function timeField(container,label,value,onChange,presets,sliderRange){
  const f=el('div','field');
  f.appendChild(elText('label','', label));
  if(presets && presets.length){
    const row=el('div','seg');
    presets.forEach(p=>{
      const b=el('button','seg-btn'+(value===p?' sel':''));
      b.textContent=p;
      b.onclick=()=>onChange(p);
      row.appendChild(b);
    });
    f.appendChild(row);
  }
  if(sliderRange){
    const {min,max,step}=sliderRange;
    let curMin = timeStrToMinutes(value);
    if(curMin===null) curMin = Math.round((min+max)/2/step)*step;
    else if(curMin < min-720) curMin += 1440;
    curMin = Math.max(min, Math.min(max, curMin));
    const sw=el('div','slider-wrap');
    const display=el('div','slider-display'); display.textContent = minutesToTimeStr(curMin);
    const input=document.createElement('input');
    input.type='range'; input.min=min; input.max=max; input.step=step; input.value=curMin;
    input.className='time-slider';
    input.oninput=(e)=>{ display.textContent = minutesToTimeStr(Number(e.target.value)); };
    input.onchange=(e)=>{ onChange(minutesToTimeStr(Number(e.target.value))); };
    sw.append(display,input);
    f.appendChild(sw);
    const nativeInp=document.createElement('input');
    nativeInp.type='time'; nativeInp.value=value||'';
    nativeInp.style.marginTop='8px';
    nativeInp.oninput=(e)=>onChange(e.target.value);
    f.appendChild(nativeInp);
  } else {
    const inp=document.createElement('input');
    inp.type='time'; inp.value=value||'';
    inp.style.marginTop = presets&&presets.length ? '8px' : '0';
    inp.oninput=(e)=>onChange(e.target.value);
    f.appendChild(inp);
  }
  container.appendChild(f);
}
function chipsField(container,label,options,value,onChange,unit){
  const f=el('div','field');
  f.appendChild(elText('label','', label));
  const row=el('div','seg');
  options.forEach(opt=>{
    const b=el('button','seg-btn'+(Number(value)===opt?' sel':''));
    b.textContent = opt+(unit?' '+unit:'');
    b.onclick=()=>onChange(opt);
    row.appendChild(b);
  });
  f.appendChild(row);
  container.appendChild(f);
}
function stepperField(container,label,value,onChange,min,max,unit){
  const f=el('div','field');
  f.appendChild(elText('label','', label));
  const row=el('div','stepper-num');
  const minus=el('button'); minus.textContent='–';
  const val=el('div','val'); val.textContent=(value||0)+(unit?' '+unit:'');
  const plus=el('button'); plus.textContent='+';
  minus.onclick=()=>{ let v=Math.max(min, (Number(value)||0)-1); onChange(v); };
  plus.onclick=()=>{ let v=Math.min(max, (Number(value)||0)+1); onChange(v); };
  row.append(minus,val,plus);
  f.appendChild(row);
  container.appendChild(f);
}
function progressDots(container,total,doneCount){
  const p=el('div','step-progress');
  for(let i=0;i<total;i++) p.appendChild(el('div','step-dot'+(i<doneCount?' done':'')));
  container.appendChild(p);
}

  if(!keys.length){
    wrap.appendChild(elText('div','empty','Chưa có dữ liệu. Bắt đầu ghi từ tối nay nhé 🌙'));
    return wrap;
  }
  wrap.appendChild(elText('div','hint','Bấm vào 1 ngày để sửa hoặc xoá.'));

    const l=logs[k];
    const dur=computeDuration(l);
    const pct = dur? Math.min(100, (dur/9)*100) : 0;
    const q=l.sleepQuality||0;
    const color = q>=4?'var(--good)': q>=3?'var(--warn)':'var(--bad)';
    const row=el('div','hist-row');
    row.style.cursor='pointer';
    row.innerHTML=`<div class="hist-date">${k.slice(5)}</div>
      <div class="hist-bar-wrap"><div class="hist-bar" style="width:${pct}%;background:${l.morningDone?color:'var(--navy-line)'}"></div></div>
      <div class="hist-q">${l.morningDone? (dur?dur.toFixed(1)+'h':'-'):'—'}</div>`;
    row.onclick=()=>nav({name:'edit', key:k});
    card.appendChild(row);
  });
  wrap.appendChild(card);

  // export
  const exp=el('div','card');
  exp.appendChild(elText('div','cta-title','Xuất dữ liệu'));
  exp.appendChild(elText('div','hint','Tải CSV để phân tích sâu hơn trong Sheets / Python.'));
  exp.appendChild(primaryBtnMargin('Tải file CSV', exportCSV));
  wrap.appendChild(exp);

  const acc=el('div','card');
  acc.innerHTML = `<div class="hint">Đang dùng: <b>${getUser()}</b></div>`;
  const sw=ghostBtn('Đổi người dùng', ()=>{
    if(confirm('Đổi người dùng? Dữ liệu hiện tại vẫn được giữ, chỉ ẩn đi cho tới khi bạn nhập lại đúng tên.')){
      clearUser();
      nav({name:'onboarding'});
    }
  });
  sw.style.marginTop='10px';
  acc.appendChild(sw);
  wrap.appendChild(acc);

  return wrap;
}
function primaryBtnMargin(label,fn){ const b=primaryBtn(label,fn); b.style.marginTop='10px'; return b; }

function exportCSV(){
  const logs=loadLogs();
  const keys=Object.keys(logs).sort();
  const cols=['date','bedtime','wakeTime','sleepLatency','sleepQuality','wakeUps','energyMorning',
    'lastMeal','lateSnack','lateSnackTime','caffeineTime','caffeineAmount','alcohol','alcoholTime',
    'exerciseDone','exerciseTime','exerciseIntensity','screenTimeMin','stress',
    'firstDrowsyTime','productivity','mood','napDone','napMin'];
  const rows=[cols.join(',')];
  keys.forEach(k=>{
    const l=logs[k];
    rows.push(cols.map(c=>l[c]!==undefined?String(l[c]).replace(/,/g,';'):'').join(','));
  });
  const blob=new Blob([rows.join('\n')],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download='sleepinsight_export.csv'; a.click();
}

/* ---------------- Tabbar ---------------- */
function renderTabbar(){
  const bar=el('div','tabbar');
  const tabs=[{n:'home',ic:'◐',l:'Hôm nay'},{n:'history',ic:'▤',l:'Lịch sử'}];
  tabs.forEach(t=>{
    const b=el('div','tab'+(route.name===t.n?' active':''));
    b.innerHTML=`<span class="ic">${t.ic}</span>${t.l}`;
    b.onclick=()=>nav({name:t.n});
    bar.appendChild(b);
  });
  return bar;
}

/* ---------------- Init ---------------- */
render();
pullFromBackend().then(changed=>{ if(changed) render(); });
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
